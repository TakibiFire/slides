<script>
function updateFontSize(size) {
  const textarea = document.querySelector('textarea.aa');
  const numSize = parseInt(size, 10) || 16;
  textarea.style.fontSize = numSize + 'px';
  // Keep the original 18/16 ratio for line height (1.125)
  textarea.style.lineHeight = (numSize * 1.125) + 'px';
}

async function download() {
  const textarea = document.querySelector('textarea.aa');
  const captureArea = document.createElement('pre');
  captureArea.className = 'aa';
  captureArea.textContent = textarea.value;
  
  const computedStyle = window.getComputedStyle(textarea);

  // Use clientWidth/Height to exclude the border from the PNG dimensions
  const captureWidth = textarea.clientWidth;
  const captureHeight = textarea.clientHeight;

  // Mirror styles for accurate capture
  Object.assign(captureArea.style, {
    position: 'absolute',
    left: '-9999px',
    top: '0',
    width: captureWidth + 'px',
    height: captureHeight + 'px',
    color: 'white',
    backgroundColor: 'transparent',
    margin: '0',
    padding: '0',
    border: 'none',
    boxSizing: 'content-box',
    fontSize: computedStyle.fontSize,
    lineHeight: computedStyle.lineHeight,
    overflow: 'hidden'
  });
  document.body.appendChild(captureArea);

  try {
    const canvas = await html2canvas(captureArea, {
      backgroundColor: null,
      useCORS: true,
      scale: 2 // Higher resolution
    });
    const link = document.createElement('a');
    link.download = 'aa.png';
    link.href = canvas.toDataURL("image/png");
    link.click();
  } catch (e) {
    console.error("Capture failed", e);
  } finally {
    document.body.removeChild(captureArea);
  }
}
</script>
